version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle routine updates into a single PR to cut noise.
      # Security updates are still raised immediately, on their own.
      all-dependencies:
        patterns:
          - "*"
    ignore:
      # TS 7 is the new Go-based compiler rewrite — broke the Next.js
      # Turbopack build worker when Dependabot bumped it (2026-07-12 PR).
      # Revisit once Next.js officially supports TS 7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
